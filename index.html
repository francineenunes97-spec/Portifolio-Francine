<!-- Checklist TI — Unidade Guarapuava/PR -->
<style>
  #ti-checklist-app {
    --bg: #0B1220;
    --surface: #121B2E;
    --surface-alt: #182338;
    --border: #24314A;
    --text: #E6EAF2;
    --text-dim: #8A96AC;
    --accent: #35C7C2;
    --success: #4ADE80;
    --warning: #F5A623;
    --danger: #F0555A;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    border-radius: 12px;
    padding: 28px 24px 32px;
    max-width: 720px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  #ti-checklist-app * { box-sizing: border-box; }
  #ti-checklist-app ::selection { background: var(--accent); color: #041312; }

  .tc-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .tc-title {
    font-size: 24px;
    font-weight: 700;
    margin: 4px 0 18px;
    letter-spacing: -0.01em;
  }

  .tc-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tc-field {
    flex: 1 1 160px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .tc-field label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .tc-field input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 9px 10px;
    font-family: var(--sans);
    font-size: 13.5px;
  }
  .tc-field input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .tc-tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 4px;
    margin-bottom: 20px;
  }
  .tc-tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .tc-tab.active {
    background: var(--accent);
    color: #041312;
    font-weight: 700;
  }
  .tc-tab:not(.active):hover { color: var(--text); }

  .tc-status-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .tc-gauge {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--surface-alt) 0);
    transition: background .3s;
  }
  .tc-gauge::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: var(--surface);
  }
  .tc-gauge span {
    position: relative;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
  }
  .tc-status-text { font-size: 13.5px; color: var(--text-dim); }
  .tc-status-text b { color: var(--text); font-weight: 700; }

  .tc-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 18px;
  }
  .tc-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    transition: border-color .15s;
  }
  .tc-item.done { border-color: rgba(74, 222, 128, 0.35); }
  .tc-item-main {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }
  .tc-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .15s, background .15s;
  }
  .tc-item.done .tc-dot {
    background: var(--success);
    border-color: var(--success);
  }
  .tc-dot svg { width: 11px; height: 11px; opacity: 0; transition: opacity .15s; }
  .tc-item.done .tc-dot svg { opacity: 1; }
  .tc-item-label {
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
  }
  .tc-item.done .tc-item-label { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--border); }
  .tc-item-num {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--accent);
    margin-right: 6px;
  }
  .tc-helper {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    padding-left: 32px;
    line-height: 1.5;
  }
  .tc-note {
    margin-top: 8px;
    margin-left: 32px;
  }
  .tc-note input {
    width: 100%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 12.5px;
    font-family: var(--sans);
  }
  .tc-note input::placeholder { color: var(--text-dim); }
  .tc-note input:focus { outline: none; border-color: var(--warning); }

  .tc-save-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 26px;
  }
  .tc-save-btn {
    background: var(--accent);
    color: #041312;
    border: none;
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: filter .15s;
  }
  .tc-save-btn:hover { filter: brightness(1.08); }
  .tc-save-btn:disabled { opacity: 0.5; cursor: default; filter: none; }
  .tc-save-msg {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--success);
    opacity: 0;
    transition: opacity .2s;
  }
  .tc-save-msg.show { opacity: 1; }

  .tc-history {
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }
  .tc-history h2 {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 12px;
    font-weight: 600;
  }
  .tc-hist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
  }
  .tc-hist-item:last-child { border-bottom: none; }
  .tc-hist-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .tc-hist-tag.ab { background: rgba(53,199,194,0.15); color: var(--accent); }
  .tc-hist-tag.fe { background: rgba(245,166,35,0.15); color: var(--warning); }
  .tc-hist-date { font-family: var(--mono); color: var(--text-dim); flex-shrink: 0; }
  .tc-hist-tech { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tc-hist-pct { font-family: var(--mono); color: var(--text-dim); flex-shrink: 0; }
  .tc-hist-empty { color: var(--text-dim); font-size: 12.5px; padding: 6px 4px; }
  .tc-loading { color: var(--text-dim); font-size: 12px; font-family: var(--mono); }
</style>

<div id="ti-checklist-app">
  <div class="tc-eyebrow">Unidade · Guarapuava / PR</div>
  <div class="tc-title">Checklist de TI</div>

  <div class="tc-meta">
    <div class="tc-field">
      <label for="tc-date">Data</label>
      <input type="date" id="tc-date">
    </div>
    <div class="tc-field">
      <label for="tc-tech">Responsável (TIC)</label>
      <input type="text" id="tc-tech" placeholder="Nome do técnico">
    </div>
  </div>

  <div class="tc-tabs">
    <button class="tc-tab active" data-turno="abertura">Abertura</button>
    <button class="tc-tab" data-turno="fechamento">Fechamento</button>
  </div>

  <div class="tc-status-row">
    <div class="tc-gauge" id="tc-gauge" style="--pct:0"><span id="tc-gauge-text">0%</span></div>
    <div class="tc-status-text" id="tc-status-text">Nenhum item concluído ainda.</div>
  </div>

  <div class="tc-list" id="tc-list"></div>

  <div class="tc-save-row">
    <button class="tc-save-btn" id="tc-save-btn">Salvar checklist</button>
    <span class="tc-save-msg" id="tc-save-msg">Salvo ✓</span>
  </div>

  <div class="tc-history">
    <h2>Últimos registros da unidade</h2>
    <div id="tc-history-list"><div class="tc-loading">Carregando histórico…</div></div>
  </div>
</div>

<script>
(function () {
  const UNIT = 'GUARAPUAVA';

  // --- Camada de armazenamento com fallback ---
  // Se window.storage não existir ou falhar, usamos memória local (dura só a sessão)
  // e avisamos o usuário, em vez de travar a ferramenta com um alert.
  const memoryStore = {};
  let storageAvailable = true;

  const store = {
    async get(key, shared) {
      if (window.storage) {
        try { return await window.storage.get(key, shared); }
        catch (e) { throw e; }
      }
      if (!(key in memoryStore)) throw new Error('not found');
      return { key, value: memoryStore[key], shared };
    },
    async set(key, value, shared) {
      if (window.storage) {
        try {
          const r = await window.storage.set(key, value, shared);
          if (r) return r;
          storageAvailable = false;
          throw new Error('storage.set returned empty result');
        } catch (e) {
          storageAvailable = false;
          memoryStore[key] = value;
          return { key, value, shared, fallback: true };
        }
      }
      storageAvailable = false;
      memoryStore[key] = value;
      return { key, value, shared, fallback: true };
    },
    async list(prefix, shared) {
      if (window.storage) {
        try { return await window.storage.list(prefix, shared); }
        catch (e) { /* fall through to memory */ }
      }
      return { keys: Object.keys(memoryStore).filter(k => k.startsWith(prefix)), prefix, shared };
    }
  };

  const ITEMS = {
    abertura: [
      { id: 'ab1', label: 'Verificar se todos os equipamentos e links monitorados estão operacionais.' },
      { id: 'ab2', label: 'Verificar se o servidor NTP está com data/hora corretos.' },
      { id: 'ab3', label: 'Verificar se todos os access points estão conectados.' },
      { id: 'ab4', label: 'Verificar se o circuito de CFTV está 100% disponível.',
        helper: 'Se faltar imagem de alguma câmera: tentar reiniciá-la primeiro. Se não resolver, informar a Coordenação de TIC para acionar o fornecedor.',
        note: true, notePlaceholder: 'Câmera(s) com problema / ação tomada (opcional)' }
    ],
    fechamento: [
      { id: 'fe1', label: 'Desligar todos os painéis e guardar os controles remotos das respectivas TVs.' },
      { id: 'fe2', label: 'Verificar se todos os computadores e impressoras do balcão digital foram desligados.' },
      { id: 'fe3', label: 'Desligar o totem e a impressora, verificando o abastecimento de papel.',
        helper: 'A chave de abertura do totem é responsabilidade da equipe TIC da unidade. Se estiver ausente, providenciar substituição e registrar chamado no sistema.',
        note: true, notePlaceholder: 'Chave substituída / nº do chamado (opcional)' },
      { id: 'fe4', label: 'Verificar se todos os computadores da área de atendimento estão desligados.' }
    ]
  };

  let turno = 'abertura';
  let state = {}; // { itemId: { checked: bool, note: string } }

  const $date = document.getElementById('tc-date');
  const $tech = document.getElementById('tc-tech');
  const $tabs = document.querySelectorAll('.tc-tab');
  const $list = document.getElementById('tc-list');
  const $gauge = document.getElementById('tc-gauge');
  const $gaugeText = document.getElementById('tc-gauge-text');
  const $statusText = document.getElementById('tc-status-text');
  const $saveBtn = document.getElementById('tc-save-btn');
  const $saveMsg = document.getElementById('tc-save-msg');
  const $historyList = document.getElementById('tc-history-list');

  function todayStr() {
    const d = new Date();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${d.getFullYear()}-${mm}-${dd}`;
  }

  function storageKey(date, t) {
    return `checklist:${UNIT}:${date}:${t}`;
  }

  function resetState() {
    state = {};
    ITEMS[turno].forEach(item => { state[item.id] = { checked: false, note: '' }; });
  }

  function renderList() {
    $list.innerHTML = '';
    ITEMS[turno].forEach((item, idx) => {
      const s = state[item.id] || { checked: false, note: '' };
      const el = document.createElement('div');
      el.className = 'tc-item' + (s.checked ? ' done' : '');
      el.innerHTML = `
        <div class="tc-item-main" data-id="${item.id}">
          <div class="tc-dot"><svg viewBox="0 0 16 16" fill="none"><path d="M2 8.5L6 12.5L14 3.5" stroke="#041312" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="tc-item-label"><span class="tc-item-num">${String(idx + 1).padStart(2, '0')}</span>${item.label}</div>
        </div>
        ${item.helper ? `<div class="tc-helper">${item.helper}</div>` : ''}
        ${item.note ? `<div class="tc-note"><input type="text" data-note-id="${item.id}" placeholder="${item.notePlaceholder}" value="${s.note.replace(/"/g, '&quot;')}"></div>` : ''}
      `;
      $list.appendChild(el);
    });

    $list.querySelectorAll('.tc-item-main').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.getAttribute('data-id');
        state[id].checked = !state[id].checked;
        renderList();
        updateStatus();
      });
    });
    $list.querySelectorAll('[data-note-id]').forEach(input => {
      input.addEventListener('click', e => e.stopPropagation());
      input.addEventListener('input', () => {
        state[input.getAttribute('data-note-id')].note = input.value;
      });
    });
  }

  function updateStatus() {
    const items = ITEMS[turno];
    const doneCount = items.filter(i => state[i.id] && state[i.id].checked).length;
    const pct = Math.round((doneCount / items.length) * 100);
    $gauge.style.setProperty('--pct', pct);
    $gaugeText.textContent = pct + '%';
    if (doneCount === 0) {
      $statusText.innerHTML = 'Nenhum item concluído ainda.';
    } else if (doneCount === items.length) {
      $statusText.innerHTML = `<b>Checklist completo</b> — ${doneCount}/${items.length} itens.`;
    } else {
      $statusText.innerHTML = `<b>${doneCount}/${items.length}</b> itens concluídos.`;
    }
  }

  async function tryLoadExisting() {
    const date = $date.value || todayStr();
    resetState();
    try {
      const res = await store.get(storageKey(date, turno), true);
      if (res && res.value) {
        const parsed = JSON.parse(res.value);
        if (parsed.items) {
          parsed.items.forEach(it => {
            if (state[it.id]) state[it.id] = { checked: !!it.checked, note: it.note || '' };
          });
        }
        if (parsed.technician) $tech.value = parsed.technician;
      }
    } catch (e) {
      // no existing record for this date/turno — fine, keep reset state
    }
    renderList();
    updateStatus();
  }

  async function saveChecklist() {
    const date = $date.value || todayStr();
    const items = ITEMS[turno].map(i => ({ id: i.id, checked: state[i.id].checked, note: state[i.id].note }));
    const payload = {
      unit: UNIT,
      date,
      turno,
      technician: $tech.value || '(não informado)',
      savedAt: new Date().toISOString(),
      items
    };
    $saveBtn.disabled = true;
    try {
      const result = await store.set(storageKey(date, turno), JSON.stringify(payload), true);
      if (result) {
        $saveMsg.textContent = storageAvailable ? 'Salvo ✓' : 'Salvo nesta sessão (sem sincronização com o time)';
        $saveMsg.classList.add('show');
        setTimeout(() => $saveMsg.classList.remove('show'), storageAvailable ? 2200 : 4000);
        loadHistory();
      }
    } catch (e) {
      console.error('Erro ao salvar checklist', e);
      $saveMsg.textContent = 'Erro ao salvar — tente novamente';
      $saveMsg.style.color = 'var(--danger)';
      $saveMsg.classList.add('show');
      setTimeout(() => $saveMsg.classList.remove('show'), 3500);
    } finally {
      $saveBtn.disabled = false;
    }
  }

  async function loadHistory() {
    $historyList.innerHTML = '<div class="tc-loading">Carregando histórico…</div>';
    try {
      const listRes = await store.list(`checklist:${UNIT}:`, true);
      const keys = (listRes && listRes.keys) ? listRes.keys.slice().sort().reverse().slice(0, 10) : [];
      if (keys.length === 0) {
        $historyList.innerHTML = '<div class="tc-hist-empty">Nenhum checklist salvo ainda.</div>';
        return;
      }
      const records = [];
      for (const k of keys) {
        try {
          const r = await store.get(k, true);
          if (r && r.value) records.push(JSON.parse(r.value));
        } catch (e) { /* skip unreadable key */ }
      }
      if (records.length === 0) {
        $historyList.innerHTML = '<div class="tc-hist-empty">Nenhum checklist salvo ainda.</div>';
        return;
      }
      $historyList.innerHTML = '';
      if (!storageAvailable) {
        const warn = document.createElement('div');
        warn.className = 'tc-hist-empty';
        warn.style.color = 'var(--warning)';
        warn.textContent = 'Modo local: o histórico abaixo só existe nesta sessão do navegador.';
        $historyList.appendChild(warn);
      }
      records.forEach(rec => {
        const done = rec.items.filter(i => i.checked).length;
        const total = rec.items.length;
        const row = document.createElement('div');
        row.className = 'tc-hist-item';
        row.innerHTML = `
          <span class="tc-hist-tag ${rec.turno === 'abertura' ? 'ab' : 'fe'}">${rec.turno === 'abertura' ? 'Abertura' : 'Fechamento'}</span>
          <span class="tc-hist-date">${rec.date}</span>
          <span class="tc-hist-tech">${rec.technician}</span>
          <span class="tc-hist-pct">${done}/${total}</span>
        `;
        $historyList.appendChild(row);
      });
    } catch (e) {
      $historyList.innerHTML = '<div class="tc-hist-empty">Não foi possível carregar o histórico.</div>';
    }
  }

  $tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      $tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      turno = tab.getAttribute('data-turno');
      tryLoadExisting();
    });
  });

  $date.addEventListener('change', tryLoadExisting);
  $saveBtn.addEventListener('click', saveChecklist);

  // init
  $date.value = todayStr();
  resetState();
  renderList();
  updateStatus();
  loadHistory();
})();
</script>
